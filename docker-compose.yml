services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=elin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elin"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/elin
      - JWT_SECRET=dev-only-change-me-please-replace-32+
      - JWT_ALGORITHM=HS256
      - JWT_EXP_MINUTES=60
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "uv sync &&
      uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --reload-exclude '.venv/*' --reload-exclude '.git/*' --reload-exclude '__pycache__/*'"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_DIST_DIR=.next-docker
      - NEXT_PUBLIC_DEV_BEARER_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJkZXYtdXNlciIsImVtYWlsIjoiZGV2QGV4YW1wbGUuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsImlhdCI6MTc3MTI5NTE5MiwiZXhwIjoyMDg2NjU1MTkyfQ.m70AkIrZkrCPLU9DaOugAv-QAgc8mztx_yi-O_KLNws
    depends_on:
      - backend
    command: sh -lc "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next-docker

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
  frontend_next_cache:
